<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Output</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161e;
      --panel-border: #1e2330;
      --accent: #e8ff47;
      --accent-dim: rgba(232, 255, 71, 0.12);
      --text-primary: #eef0f7;
      --text-secondary: #7a7f96;
      --text-label: #4e5368;
      --input-bg: #0a0c11;
      --input-border: #252a3a;
      --radius: 14px;

      --dot-empty: #1e2330;
      --dot-red: #ff4d4d;
      --dot-orange: #ff9b3d;
      --dot-yellow: var(--accent);
      --dot-green: #4dff91;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background-image:
        radial-gradient(ellipse 60% 40% at 70% 10%, rgba(232,255,71,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 90%, rgba(100,120,255,0.05) 0%, transparent 60%);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      width: 100%;
      max-width: 560px;
      padding: 40px 40px 36px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 64px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--text-primary);
      line-height: 1;
    }

    .title span { color: var(--accent); }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid rgba(232,255,71,0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Overall Health Section ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-label);
      margin-bottom: 14px;
    }

    .health-bar-wrap {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      animation: slideUp 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .health-score-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 1px;
      line-height: 1;
      min-width: 60px;
      transition: color 0.3s ease;
    }

    .health-score-label.score-red { color: var(--dot-red); }
    .health-score-label.score-yellow { color: var(--dot-yellow); }
    .health-score-label.score-orange { color: var(--dot-orange); }
    .health-score-label.score-green { color: var(--dot-green); }

    .health-dots-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .health-dots {
      display: flex;
      gap: 50px;
    }

    .hdot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .hdot.filled-red    { background: var(--dot-red);    box-shadow: 0 0 10px rgba(255,77,77,0.5); }
    .hdot.filled-orange { background: var(--dot-orange); box-shadow: 0 0 10px rgba(255,155,61,0.4); }
    .hdot.filled-yellow { background: var(--dot-yellow); box-shadow: 0 0 10px rgba(232,255,71,0.4); }
    .hdot.filled-green  { background: var(--dot-green);  box-shadow: 0 0 10px rgba(77,255,145,0.4); }
    .hdot.empty         { background: var(--dot-empty); border-color: var(--input-border); }

    .health-scale {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-label);
      letter-spacing: 0.5px;
      padding: 0 2px;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--panel-border);
      margin: 0 0 28px;
    }

    /* ── Problems Table ── */
    /* 5 dots × 12px + 4 gaps × 5px = 80px, plus padding = 100px per rating col */
    .table-header {
      display: grid;
      grid-template-columns: 1fr 100px 100px;
      gap: 8px;
      padding: 0 4px 10px;
      border-bottom: 1px solid var(--panel-border);
      margin-bottom: 4px;
    }

    .th {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-label);
    }

    /* Each rating header sits above the dots — centred over the dot track */
    .th.rating-th {
      text-align: center;
      width: 80px; /* matches dot track width */
      margin: 0 auto;
    }

    .problem-row {
      display: grid;
      grid-template-columns: 1fr 100px 100px;
      gap: 8px;
      align-items: center;
      padding: 14px 4px;
      border-bottom: 1px solid rgba(30,35,48,0.6);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: background 0.15s;
      border-radius: 8px;
    }

    .problem-row:nth-child(1) { animation-delay: 0.18s; }
    .problem-row:nth-child(2) { animation-delay: 0.24s; }
    .problem-row:nth-child(3) { animation-delay: 0.30s; }

    .problem-row:hover {
      background: rgba(255,255,255,0.02);
    }

    .problem-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Rating dots — fixed 80px track, evenly spaced to fill full width */
    .rating-cell {
      display: flex;
      justify-content: center;
    }

    .rating-dots {
      display: flex;
      justify-content: space-between;
      width: 80px; /* 5 dots × 12px + 4 gaps × 5px = exactly 80px */
    }

    .rdot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rdot.on-red    { background: var(--dot-red);    box-shadow: 0 0 6px rgba(255,77,77,0.6); }
    .rdot.on-orange { background: var(--dot-orange); box-shadow: 0 0 6px rgba(255,155,61,0.5); }
    .rdot.on-yellow { background: var(--dot-yellow); box-shadow: 0 0 6px rgba(232,255,71,0.5); }
    .rdot.on-green  { background: var(--dot-green);  box-shadow: 0 0 6px rgba(77,255,145,0.5); }
    .rdot.off       { background: var(--dot-empty); }

    /* Back button */
    .btn-back {
      position: fixed;
      top: 32px;
      left: 32px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      z-index: 100;
    }

    .btn-back:hover {
      border-color: var(--accent);
      background: rgba(232,255,71,0.08);
    }

    @media (max-width: 520px) {
      .card { padding: 28px 20px; }
      .hdot { width: 22px; height: 22px; }
      .health-score-label { font-size: 32px; min-width: 48px; }
    }
  </style>
</head>
<body>

  <!-- Back button -->
  <button class="btn-back" onclick="window.location.href='vehicle-health.html'">← Back</button>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <h1 class="title">Health <span>Output</span></h1>
      <div class="badge">
        <div class="badge-dot"></div>
        Scan Complete
      </div>
    </div>

    <!-- Overall Health -->
    <p class="section-label">Overall Health</p>
    <div class="health-bar-wrap">
      <div class="health-score-label" id="healthScore">1/5</div>
      <div class="health-dots-col">
        <div class="health-dots" id="healthDots">
          <div class="hdot filled-red"></div>
          <div class="hdot empty"></div>
          <div class="hdot empty"></div>
          <div class="hdot empty"></div>
          <div class="hdot empty"></div>
        </div>
        <div class="health-scale">
          <span>Critical</span>
          <span>Poor</span>
          <span>Fair</span>
          <span>Good</span>
          <span>Excellent</span>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- Identified Problems -->
    <p class="section-label" style="margin-bottom: 16px;">Identified Problems</p>

    <div class="table-header">
      <div class="th">Problem</div>
      <div class="th rating-th">Severity</div>
      <div class="th rating-th">Complexity</div>
    </div>

    <div id="problemsContainer"></div>

  </div>

  <script>
    // Mapping for colors based on ratings - green (simple/low) to red (complex/severe)
    const colorMap = {
      1: 'green',
      2: 'yellow',
      3: 'yellow',
      4: 'orange',
      5: 'red'
    };

    function getColorClass(rating) {
      if (rating === 1) return 'green';
      if (rating === 2) return 'yellow';
      if (rating === 3) return 'yellow';
      if (rating === 4) return 'orange';
      return 'red';
    }

    function createHealthDots(score) {
      const dots = [];
      for (let i = 1; i <= 5; i++) {
        const dot = document.createElement('div');
        dot.className = 'hdot';
        if (i <= score) {
          dot.classList.add(`filled-${getColorClass(score)}`);
        } else {
          dot.classList.add('empty');
        }
        dots.push(dot);
      }
      return dots;
    }

    function createRatingDots(rating) {
      const dots = [];
      const colorClass = getColorClass(rating);
      for (let i = 1; i <= 5; i++) {
        const dot = document.createElement('div');
        dot.className = 'rdot';
        if (i <= rating) {
          dot.classList.add(`on-${colorClass}`);
        } else {
          dot.classList.add('off');
        }
        dots.push(dot);
      }
      return dots;
    }

    function populateHealthOutput() {
      try {
        // Retrieve vehicle data from sessionStorage
        const vehicleDataStr = sessionStorage.getItem('vehicleData');
        console.log('vehicleDataStr:', vehicleDataStr);
        
        if (!vehicleDataStr) {
          console.error('No vehicle data found in sessionStorage');
          document.getElementById('problemsContainer').innerHTML = 
            '<div style="color: var(--text-secondary); text-align: center; padding: 20px;">No vehicle data found. Please submit the form first.</div>';
          return;
        }

        const vehicleData = JSON.parse(vehicleDataStr);
        console.log('vehicleData:', vehicleData);
        
        const diagnosis = vehicleData.diagnosis;
        console.log('diagnosis:', diagnosis);

        // Parse diagnosis JSON
        let diagnosisObj;
        try {
          diagnosisObj = JSON.parse(diagnosis);
          console.log('diagnosisObj parsed:', diagnosisObj);
        } catch (e) {
          console.warn('Initial JSON parse failed, trying to extract JSON:', e);
          // If diagnosis is a string with JSON inside, try to extract it
          const jsonMatch = diagnosis.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            console.log('Found JSON in string:', jsonMatch[0]);
            diagnosisObj = JSON.parse(jsonMatch[0]);
          } else {
            throw new Error('Could not parse diagnosis JSON: ' + e.message);
          }
        }

        // Update health score
        const healthScore = diagnosisObj.overallHealth || 1;
        console.log('healthScore:', healthScore);
        const scoreLabel = document.getElementById('healthScore');
        scoreLabel.textContent = `${healthScore}/5`;
        
        // Apply color class based on score
        scoreLabel.className = 'health-score-label score-' + getColorClass(healthScore);

        // Update health dots
        const healthDotsContainer = document.getElementById('healthDots');
        healthDotsContainer.innerHTML = '';
        createHealthDots(healthScore).forEach(dot => {
          healthDotsContainer.appendChild(dot);
        });

        // Populate problems table
        const problemsContainer = document.getElementById('problemsContainer');
        problemsContainer.innerHTML = '';

        if (diagnosisObj.problems && Array.isArray(diagnosisObj.problems)) {
          console.log('Problems found:', diagnosisObj.problems);
          diagnosisObj.problems.forEach((problem, index) => {
            const problemRow = document.createElement('div');
            problemRow.className = 'problem-row';
            problemRow.style.animationDelay = `${0.18 + index * 0.06}s`;

            // Problem name
            const problemName = document.createElement('div');
            problemName.className = 'problem-name';
            problemName.textContent = problem.name || 'Unknown Problem';

            // Severity rating dots
            const severityCell = document.createElement('div');
            severityCell.className = 'rating-cell';
            const severityDots = document.createElement('div');
            severityDots.className = 'rating-dots';
            createRatingDots(problem.severity || 1).forEach(dot => {
              severityDots.appendChild(dot);
            });
            severityCell.appendChild(severityDots);

            // Complexity rating dots
            const complexityCell = document.createElement('div');
            complexityCell.className = 'rating-cell';
            const complexityDots = document.createElement('div');
            complexityDots.className = 'rating-dots';
            createRatingDots(problem.complexity || 1).forEach(dot => {
              complexityDots.appendChild(dot);
            });
            complexityCell.appendChild(complexityDots);

            // Append to row
            problemRow.appendChild(problemName);
            problemRow.appendChild(severityCell);
            problemRow.appendChild(complexityCell);

            // Append row to container
            problemsContainer.appendChild(problemRow);
          });
        } else {
          console.warn('No problems array found in diagnosis');
        }
      } catch (error) {
        console.error('Error populating health output:', error);
        document.getElementById('problemsContainer').innerHTML = 
          '<div style="color: var(--text-secondary); text-align: center; padding: 20px;">Error: ' + error.message + '</div>';
      }
    }

    // Populate on page load
    document.addEventListener('DOMContentLoaded', populateHealthOutput);
  </script>
